<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技能清单</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --border: #e8e5e1;
    --text: #1a1a1a;
    --text-muted: #8c8c8c;
    --accent: #2c2c2c;
    --green: #5b8c5a;
    --red: #c46b6b;
    --amber: #c4945a;
    --purple: #8b7aaa;
    --blue: #6b8fbf;
    --font: "PingFang SC", "Microsoft YaHei", "Hiragino Sans", system-ui, -apple-system, sans-serif;
    --font-mono: "SF Mono", "Cascadia Code", "Consolas", "Courier New", monospace;
    --radius: 4px;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.6; }
  .app { display: flex; height: 100vh; overflow: hidden; }
  /* 左侧栏 */
  .sidebar { width: 380px; min-width: 280px; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--surface); }
  .sidebar-header { padding: 20px 20px 12px; border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.02em; }
  .sidebar-header .meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .sidebar-tools { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; }
  .sidebar-tools input, .sidebar-tools select { border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; font-size: 12px; font-family: var(--font); color: var(--text); background: var(--bg); outline: none; }
  .sidebar-tools input:focus, .sidebar-tools select:focus { border-color: var(--accent); }
  .sidebar-tools input { flex: 1; min-width: 0; }
  .sidebar-tools select { background: var(--bg); cursor: pointer; }
  .skill-list { flex: 1; overflow-y: auto; }
  .skill-item { padding: 10px 20px; cursor: pointer; border-left: 3px solid transparent; transition: background 0.1s, border-color 0.1s; display: flex; align-items: baseline; gap: 8px; }
  .skill-item:hover { background: #f5f4f1; }
  .skill-item.active { background: #f0efec; border-left-color: var(--accent); }
  .skill-item-name { font-family: var(--font-mono); font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; max-width: 200px; }
  .skill-item-badges { display: flex; gap: 4px; flex-shrink: 0; margin-left: auto; }
  .badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 500; white-space: nowrap; letter-spacing: 0.02em; }
  .badge-origin { background: #e8e5e1; color: var(--text-muted); }
  .badge-on { background: #e3ece2; color: var(--green); }
  .badge-off { background: #f3e5e5; color: var(--red); }
  .badge-warn { background: #f5efe3; color: var(--amber); }
  .badge-plugin { background: #eae7f3; color: var(--purple); }
  .badge-symlink { color: var(--text-muted); }
  .badge-hidden { background: #f5efe3; color: var(--amber); }
  /* 右侧详情 */
  .detail { flex: 1; overflow-y: auto; padding: 28px 32px; background: var(--bg); }
  .detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 14px; }
  .detail h2 { font-family: var(--font-mono); font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .detail .detail-ns { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
  .detail .detail-desc { font-size: 14px; line-height: 1.7; color: var(--text); margin-bottom: 20px; white-space: pre-wrap; }
  .detail dl { display: grid; grid-template-columns: 100px 1fr; gap: 8px 12px; font-size: 13px; }
  .detail dt { color: var(--text-muted); }
  .detail dd { color: var(--text); font-family: var(--font-mono); font-size: 13px; word-break: break-all; }
  .detail .sep { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .detail h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .detail pre { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; font-family: var(--font-mono); font-size: 12px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
  .diagnostics { margin-top: 8px; }
  .diagnostic { font-size: 12px; padding: 6px 10px; border-radius: var(--radius); margin-top: 4px; }
  .diagnostic.info { background: #edf3fa; color: var(--blue); }
  .diagnostic.warning { background: #fdf5ed; color: var(--amber); }
  .diagnostic.error { background: #fcefef; color: var(--red); }
  .actions { margin-top: 16px; display: flex; gap: 6px; flex-wrap: wrap; }
  .btn { font-size: 11px; padding: 5px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-family: var(--font); transition: background 0.1s; }
  .btn:hover { background: var(--bg); border-color: var(--accent); }
  .banner { margin: 0 0 0; padding: 8px 20px; background: #fdf5ed; border-bottom: 1px solid #f0dca8; font-size: 11px; color: var(--amber); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 12px; font-weight: 500; opacity: 0; transition: opacity 0.2s; z-index: 999; pointer-events: none; }
  .toast.show { opacity: 1; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 13px; }
  /* 响应式 */
  @media (max-width: 768px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; min-width: 0; max-height: 45vh; }
    .detail { padding: 20px; }
    .skill-item-name { max-width: 140px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>技能清单</h1>
      <div class="meta" id="stats"></div>
    </div>
    <div class="banner" id="privacy-banner" style="display:none">
      ⚠️ 此文件含本地路径，请勿公开分享。
    </div>
    <div class="sidebar-tools">
      <input type="text" id="search" placeholder="搜索名称或描述…" oninput="render()">
      <select id="filterOrigin" onchange="render()">
        <option value="all">来源：全部</option>
        <option value="personal">个人</option>
        <option value="project">项目</option>
        <option value="plugin">插件</option>
      </select>
      <select id="filterVisibility" onchange="render()">
        <option value="all">可见性：全部</option>
        <option value="visible">可见</option>
        <option value="hidden">隐藏</option>
        <option value="on">开启</option>
        <option value="name-only">仅名称</option>
        <option value="user-invocable-only">仅手动调用</option>
        <option value="off">关闭</option>
        <option value="plugin-disabled">插件已禁用</option>
      </select>
      <select id="sortBy" onchange="render()">
        <option value="name">排序：名称</option>
        <option value="origin">排序：来源</option>
        <option value="visibility">排序：可见性</option>
      </select>
    </div>
    <div class="skill-list" id="skillList"></div>
  </div>
  <div class="detail" id="detailPane">
    <div class="detail-empty">← 选择左侧技能查看详情</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script id="dashboard-data" type="application/json">
{{DATA}}
</script>

<script>
const data = JSON.parse(document.getElementById('dashboard-data').textContent);
const skills = data.skills || [];
const plugins = data.plugins || [];
const stats = data.stats || {};
let activeId = null;

// Stats
document.getElementById('stats').textContent =
  `${stats.totalSkills || skills.length} 个技能 · ${stats.visibleSkills || 0} 可见 · ${stats.hiddenSkills || 0} 隐藏 · ${stats.pluginsTotal || plugins.length} 插件 · ${stats.warnings || 0} 警告`;

// Privacy banner
if (data.scanContext?.privacyMode === 'local') {
  document.getElementById('privacy-banner').style.display = 'block';
}

// ── 描述中译（ponytail: 覆盖常见英文描述，懒到只加一条映射）──
const DESC_ZH = {
  'brainstorming': '任何创造性工作前必须使用——探索用户意图、需求和设计方案。',
  'dispatching-parallel-agents': '当有两个以上可独立执行的子任务时使用。',
  'executing-plans': '当有一套写好的实现计划需要在独立会话中执行时使用。',
  'finishing-a-development-branch': '实现完成、所有测试通过后，决定如何合并或提交 PR。',
  'receiving-code-review': '收到代码审查反馈后、实现建议前使用——需要技术严谨性，而非敷衍式同意。',
  'requesting-code-review': '完成任务、实现主要功能、或合并前，验证工作是否满足要求。',
  'subagent-driven-development': '在当前会话中执行包含独立任务的实现计划时使用。',
  'systematic-debugging': '遇到任何 bug、测试失败或意外行为时，在提出修复方案前使用。',
  'test-driven-development': '实现任何功能或修复 bug 前，先写测试再写代码。',
  'using-git-worktrees': '开始需要与当前工作区隔离的功能开发时使用。',
  'using-superpowers': '每次对话开始时使用——建立如何查找和使用 skill 的规则。',
  'verification-before-completion': '声称工作完成、修复或通过前，必须先运行验证命令并确认输出。',
  'writing-plans': '有多步骤任务的规格说明或需求时，在写代码前使用。',
  'writing-skills': '创建新 skill、编辑现有 skill、或验证 skill 部署前使用时。',
  'ponytail': '强制使用最简单、最短、最小的可行方案。质疑一切是否必要。',
  'ponytail-audit': '全仓库审查过度工程——列出该删的、该简化的、该用标准库替换的。',
  'ponytail-debt': '采集代码库中所有 ponytail: 注释，生成技术债务台账。',
  'ponytail-gain': '展示 ponytail 的实际效果——更少代码、更低成本、更快速度。',
  'ponytail-help': 'ponytail 所有模式和命令的速查卡片。',
  'ponytail-review': '专注于过度工程的代码审查——发现可删除的重复实现和多余依赖。',
  'ui-ux-pro-max': 'UI/UX 设计智能——67 种风格、161 套色板、57 款字体组合、25 类图表。',
  'banner-design': '社交媒体、广告、网站英雄图、创意素材和印刷品横幅设计。',
  'brand': '品牌声音、视觉识别、信息框架、资产管理、品牌一致性。',
  'design': '综合设计 skill——品牌识别、设计令牌、UI 样式、Logo 生成、企业形象。',
  'design-system': '设计令牌架构、组件规格说明、三层令牌体系。',
  'slides': '创建带 Chart.js、设计令牌、响应式布局的战略级 HTML 演示文稿。',
  'ui-styling': '使用 shadcn/ui 组件创建美观、可访问的用户界面。',
  'ask-matt': '询问哪个 skill 或流程适合你的情况——已安装 skill 的路由器。',
};
function zh(skill) {
  const name = (skill.commandName || '').split(':').pop();
  return DESC_ZH[name] || skill.description || '';
}

// Visibility display labels (中文)
const VIS_LABELS = {
  'on': '开启',
  'name-only': '仅名称',
  'user-invocable-only': '仅手动',
  'off': '关闭',
  'plugin-disabled': '已禁用',
  'disabled-by-policy': '策略禁用',
  'unknown': '未知',
};

const ORIGIN_LABELS = {
  'personal': '个人',
  'project': '项目',
  'plugin': '插件',
  'bundled': '内置',
  'enterprise': '企业',
  'nested-project': '嵌套项目',
  'unknown': '未知',
};

const STORAGE_LABELS = {
  'real-directory': '实际目录',
  'symlink': '符号链接',
  'command-file': '命令文件',
  'plugin-root-skill': '插件根技能',
  'unknown': '未知',
};

function visBadgeClass(v) {
  if (v === 'on') return 'badge-on';
  if (v === 'off' || v === 'plugin-disabled' || v === 'disabled-by-policy') return 'badge-off';
  return 'badge-hidden';
}

function render() {
  const search = (document.getElementById('search').value || '').toLowerCase();
  const filterOrigin = document.getElementById('filterOrigin').value;
  const filterVisibility = document.getElementById('filterVisibility').value;
  const sortBy = document.getElementById('sortBy').value;

  let filtered = [...skills];

  if (search) {
    filtered = filtered.filter(s =>
      s.commandName.toLowerCase().includes(search) ||
      (s.description || '').toLowerCase().includes(search) ||
      (s.namespace || '').toLowerCase().includes(search) ||
      (s.tags || []).some(t => t.toLowerCase().includes(search))
    );
  }

  if (filterOrigin !== 'all') filtered = filtered.filter(s => s.origin === filterOrigin);

  if (filterVisibility === 'visible') {
    filtered = filtered.filter(s => s.visibility === 'on' || s.visibility === 'name-only');
  } else if (filterVisibility === 'hidden') {
    filtered = filtered.filter(s => s.visibility === 'off' || s.visibility === 'plugin-disabled' || s.visibility === 'disabled-by-policy');
  } else if (filterVisibility !== 'all') {
    filtered = filtered.filter(s => s.visibility === filterVisibility);
  }

  if (sortBy === 'origin') {
    filtered.sort((a, b) => (a.origin || '').localeCompare(b.origin || ''));
  } else if (sortBy === 'visibility') {
    const visOrder = { 'on': 0, 'name-only': 1, 'user-invocable-only': 2, 'unknown': 3, 'plugin-disabled': 4, 'off': 5 };
    filtered.sort((a, b) => (visOrder[a.visibility] || 3) - (visOrder[b.visibility] || 3));
  } else {
    filtered.sort((a, b) => (a.commandName || '').localeCompare(b.commandName || ''));
  }

  const list = document.getElementById('skillList');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">没有匹配的技能。</div>';
    return;
  }

  list.innerHTML = filtered.map(s => {
    const warnCount = (s.diagnostics || []).filter(d => d.level !== 'info').length;
    let badges = `<span class="badge badge-origin">${esc(ORIGIN_LABELS[s.origin] || s.origin)}</span>`;
    badges += `<span class="badge ${visBadgeClass(s.visibility)}">${esc(VIS_LABELS[s.visibility] || s.visibility)}</span>`;
    if (s.namespace) badges += `<span class="badge badge-plugin">${esc(s.namespace)}</span>`;
    if (s.isSymlink) badges += `<span class="badge badge-symlink">链接</span>`;
    if (warnCount > 0) badges += `<span class="badge badge-warn">${warnCount}⚠</span>`;

    const activeClass = s.id === activeId ? ' active' : '';
    return `<div class="skill-item${activeClass}" onclick="selectSkill('${s.id}')">
      <span class="skill-item-name">${esc(s.commandName)}</span>
      <span class="skill-item-badges">${badges}</span>
    </div>`;
  }).join('');
}

function selectSkill(id) {
  activeId = id;
  const skill = skills.find(s => s.id === id);
  if (!skill) return;

  const detail = document.getElementById('detailPane');
  const visLabel = VIS_LABELS[skill.visibility] || skill.visibility;

  let html = `<h2>${esc(skill.commandName)}</h2>`;
  if (skill.namespace) html += `<div class="detail-ns">${esc(skill.namespace)} · ${esc(ORIGIN_LABELS[skill.origin] || skill.origin)}</div>`;
  html += `<div class="detail-desc">${esc(zh(skill) || '（无描述）')}</div>`;

  html += `<hr class="sep"><h3>基本信息</h3><dl>
    <dt>命令名</dt><dd>${esc(skill.commandName)}</dd>
    <dt>来源</dt><dd>${esc(ORIGIN_LABELS[skill.origin] || skill.origin)}</dd>
    <dt>存储方式</dt><dd>${esc(STORAGE_LABELS[skill.storage] || skill.storage)}</dd>
    <dt>路径</dt><dd>${esc(skill.pathDisplay || skill.localPath || '—')}</dd>
    ${skill.isSymlink ? `<dt>链接目标</dt><dd>${esc(skill.symlinkTargetDisplay || '—')}</dd>` : ''}
    ${skill.pluginVersion ? `<dt>插件版本</dt><dd>${esc(skill.pluginVersion)}</dd>` : ''}
    <dt>模型可调用</dt><dd>${skill.modelInvocable ? '是' : '否'}</dd>
    <dt>用户可调用</dt><dd>${skill.userInvocable ? '是' : '否'}</dd>
  </dl>`;

  if ((skill.tags || []).length) {
    html += `<hr class="sep"><h3>标签</h3><p style="font-size:12px;color:var(--text-muted)">${esc(skill.tags.join(' · '))}</p>`;
  }

  if (Object.keys(skill.frontmatter || {}).length > 0) {
    html += `<hr class="sep"><h3>前置元数据</h3><pre>${esc(JSON.stringify(skill.frontmatter, null, 2))}</pre>`;
  }

  if ((skill.diagnostics || []).length > 0) {
    html += `<hr class="sep"><h3>诊断</h3><div class="diagnostics">`;
    for (const d of skill.diagnostics) {
      const levelNames = { info: '信息', warning: '警告', error: '错误' };
      html += `<div class="diagnostic ${esc(d.level)}">[${levelNames[d.level] || d.level}] ${esc(d.code)}: ${esc(d.message)}</div>`;
    }
    html += '</div>';
  }

  html += `<div class="actions">${generateActionButtons(skill)}</div>`;
  detail.innerHTML = html;
}

function generateActionButtons(skill) {
  const buttons = [];

  if (skill.origin === 'plugin' && skill.pluginKey) {
    const plugin = plugins.find(p => p.key === skill.pluginKey);
    if (plugin) {
      if (plugin.enabled) {
        buttons.push(`<button class="btn" onclick="copyCommand('claude plugin disable ${escAttr(skill.pluginKey)} --scope user')">禁用此插件</button>`);
      } else {
        buttons.push(`<button class="btn" onclick="copyCommand('claude plugin enable ${escAttr(skill.pluginKey)} --scope user')">启用此插件</button>`);
      }
    }
  } else if (skill.origin === 'personal' || skill.origin === 'project') {
    const dirName = skill.commandName.split(':').pop();
    if (skill.visibility === 'off') {
      buttons.push(`<button class="btn" onclick="copyPatch('${escAttr(dirName)}', 'on')">开启此技能</button>`);
    } else {
      buttons.push(`<button class="btn" onclick="copyPatch('${escAttr(dirName)}', 'off')">关闭此技能</button>`);
    }
    if (skill.visibility !== 'name-only') {
      buttons.push(`<button class="btn" onclick="copyPatch('${escAttr(dirName)}', 'name-only')">仅显示名称</button>`);
    }
  }

  if (skill.isSymlink && skill.pathDisplay) {
    buttons.push(`<button class="btn" onclick="copyText('删除: ${escAttr(skill.pathDisplay)}')">复制路径</button>`);
  }

  return buttons.join(' ');
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function copyCommand(cmd) { navigator.clipboard.writeText(cmd).then(() => toast('命令已复制')); }
function copyPatch(skillName, visibility) {
  const patch = JSON.stringify({ skillOverrides: { [skillName]: visibility } }, null, 2);
  navigator.clipboard.writeText(patch).then(() => toast('配置补丁已复制'));
}
function copyText(text) { navigator.clipboard.writeText(text).then(() => toast('已复制')); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// Init
render();
</script>
</body>
</html>
